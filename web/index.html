<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IoT Gateway Dashboard</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css?v=20260404" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="page">
    <header class="hero">
      <h1>IoT Gateway Dashboard</h1>
      <p>Monitoreo en tiempo real de eventos multicast y control por dispositivo.</p>
      <div class="status-pill" id="connectionStatus">Desconectado</div>
    </header>

    <section class="panel">
      <nav class="tabs" id="tabsNav" aria-label="Pestanas del dashboard">
        <button class="tab-btn is-active" data-tab="general" type="button">General</button>
      </nav>

      <section class="tab-content is-active" data-content="general">
        <div class="general-grid">
          <article class="card">
            <h2>Historial Multicast</h2>
            <p class="muted">Mensajes recibidos por el gateway en tiempo real.</p>
            <ul id="multicastHistory" class="event-list"></ul>
          </article>

          <article class="card">
            <h2>Dispositivos Detectados</h2>
            <p class="muted">Resumen de dispositivos activos y ultima telemetria recibida.</p>
            <div id="devicesSummary" class="devices-summary"></div>
          </article>
        </div>
      </section>

      <section id="deviceTabsContainer"></section>
    </section>
  </main>

  <template id="deviceTabTemplate">
    <button class="tab-btn" type="button"></button>
  </template>

  <template id="deviceContentTemplate">
    <section class="tab-content device-content">
      <div class="device-grid">
        <article class="card card-highlight">
          <h2 class="device-title">Device</h2>
          <p class="device-meta"></p>
          <div class="kpis">
            <div class="kpi">
              <span>Temperatura actual</span>
              <strong class="temp-value">--</strong>
            </div>
            <div class="kpi">
              <span>Humedad actual</span>
              <strong class="hum-value">--</strong>
            </div>
          </div>
          <div class="controls">
            <button class="cmd-btn cmd-on" data-cmd="LED_ON" type="button">LED ON</button>
            <button class="cmd-btn cmd-off" data-cmd="LED_OFF" type="button">LED OFF</button>
            <button class="cmd-btn cmd-status" data-cmd="STATUS" type="button">STATUS</button>
          </div>
          <div class="command-log"></div>
        </article>

        <article class="card chart-card">
          <h3>Grafica Temperatura</h3>
          <canvas class="chart chart-temp" width="640" height="260"></canvas>
        </article>

        <article class="card chart-card">
          <h3>Grafica Humedad</h3>
          <canvas class="chart chart-hum" width="640" height="260"></canvas>
        </article>
      </div>
    </section>
  </template>

  <script src="/assets/js/dashboard.js?v=20260404" defer></script>
</body>
</html>
