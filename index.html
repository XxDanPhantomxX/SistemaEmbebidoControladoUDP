<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control (unicast) y Monitoreo (multicast) de Sistema Embebido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 16px;
        }

        h1,
        h2 {
            margin-bottom: 10px;
        }

        .estado {
            margin-bottom: 16px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .botones {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .panel {
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 16px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 100px;
        }

        @media (min-width: 700px) {
            .botones {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <h1>Control IoT UDP</h1>
    <div class="estado" id="conexion">Conectando...</div>

    <div class="panel">
        <h2>Comandos</h2>
        <div class="botones">
            <button onclick="enviarComando('LED_ON')">LED ON</button>
            <button onclick="enviarComando('LED_OFF')">LED OFF</button>
            <button onclick="enviarComando('STATUS')">STATUS</button>
        </div>
    </div>

    <div class="panel">
        <h2>Respuesta unicast</h2>
        <pre id="respuesta">Sin respuestas aún.</pre>
    </div>

    <div class="panel">
        <h2>Eventos multicast</h2>
        <pre id="eventos">Sin eventos aún.</pre>
    </div>

    <script>
        const conexion = document.getElementById("conexion");
        const respuesta = document.getElementById("respuesta");
        const eventos = document.getElementById("eventos");
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");

        ws.onopen = () => {
            conexion.textContent = "Conectado al gateway";
        };

        ws.onclose = () => {
            conexion.textContent = "Desconectado";
        };

        ws.onerror = () => {
            conexion.textContent = "Error de conexión";
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "response") {
                    respuesta.textContent = JSON.stringify(data, null, 2) + "\n\n" + respuesta.textContent;
                } else if (data.type === "event") {
                    eventos.textContent = JSON.stringify(data, null, 2) + "\n\n" + eventos.textContent;
                } else {
                    respuesta.textContent = event.data + "\n\n" + respuesta.textContent;
                }
            } catch (e) {
                respuesta.textContent = event.data + "\n\n" + respuesta.textContent;
            }
        };

        function enviarComando(command) {
            if (ws.readyState !== WebSocket.OPEN) {
                respuesta.textContent = "WebSocket no conectado.\n\n" + respuesta.textContent;
                return;
            }

            ws.send(JSON.stringify({ command: command }));
        }
    </script>
</body>
</html>
